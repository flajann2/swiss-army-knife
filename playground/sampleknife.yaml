name: Sample Knife Document
description: sample knives to use with sak
author:
  name: Fred Mitchell
  email: fred.mitchell@atomlogik.de
copyright:
  holder: Atomlogik.de
  year: 2024
knives:
  - knife: ExtIP
    options: 
    - option:
      optype: switch
      long: nolocation
      short: n
      help: Don't display location information
    - option:
      optype: switch
      long: ipv6
      short: i
      help: Display the IPv6 address
    action:
      - exe:
          bash: |
            ls
            pwd
            echo "hello world"
          unless: nolocation |
            echo "show location"
          whens:
            - when: ipv6 |
                echo "show IPv6"
              otherwise: |
                echo "show IPv4"
      - exe: |
            echo "The Grand Final"
  - knife: Kernel
    options:
    - option:
      optype: switch
      long: justversion
      short: j
      help: Just display the numerical version number, no adjoining texet.
    action:
      exe: echo "some action and we are ignoring the switch for now"
  - knife: Sleep
    options:
    - option:
      optype: parm
      long: wait
      short: w
      meta: SECONDS
      parmtype: Int
      help: Seconds to wait before going to sleep
    - option:
      optype: switch
      long: shutdown
      short: H
      help: Shutdown the system, not sleep
    action:
      whens:
        - when: wait
          bash: |
                sleep ${SECONDS}
                echo "wait ${SECONDS} seconds then hibernate"
        - when: shutdown
          bash: |
                echo "halt"
      otherwise:
        bash: |
          echo "hibernate"
        
